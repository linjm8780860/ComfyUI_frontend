name: Publish Dev Package to UAT

on:
  workflow_dispatch:
    inputs:
      branch:
        description: "Publish Dev Package to UAT"
        required: false
        default: "dev"
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ github.event.inputs.branch || 'dev' }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout specified branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch || 'dev' }}

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Read original version and create UAT version
        id: version_processing
        run: |
          ORIGINAL_VERSION=$(cat version.txt)
          echo "Original version: $ORIGINAL_VERSION"

          TIMESTAMP=$(date +%Y%m%d%H%M%S)
          UAT_VERSION="${ORIGINAL_VERSION}.dev${TIMESTAMP}"

          echo "UAT_VERSION=$UAT_VERSION" >> $GITHUB_ENV
          echo "Publishing UAT version: $UAT_VERSION"

          echo "$UAT_VERSION" > version.txt

      - name: Install Python build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build wheel twine

      - name: Build Python package
        run: |
          rm -rf comfyui_frontend_package/dist
          COMFYUI_FRONTEND_PACKAGE_NAME="comfyui-frontend-package-ljm" \
          COMFYUI_FRONTEND_VERSION="$UAT_VERSION" \
          bash scripts/build_pypi_package.sh

      - name: Verify package version
        run: |
          PACKAGE_NAME=$(ls comfyui_frontend_package/dist/*.whl | head -n1)
          echo "Built package: $PACKAGE_NAME"

          if [[ $PACKAGE_NAME != *"$UAT_VERSION"* ]]; then
            echo "Error: Package version doesn't match expected UAT version"
            echo "Expected: $UAT_VERSION"
            echo "Actual package: $PACKAGE_NAME"
            exit 1
          fi

      - name: Verify wheel contains frontend static assets
        run: |
          python - <<'PY'
          import glob
          import sys
          import zipfile

          wheel = glob.glob("comfyui_frontend_package/dist/*.whl")
          if not wheel:
              print("No wheel found in comfyui_frontend_package/dist", file=sys.stderr)
              sys.exit(1)

          wheel_path = wheel[0]
          with zipfile.ZipFile(wheel_path) as zf:
              static_files = [
                  name for name in zf.namelist()
                  if name.startswith("comfyui_frontend_package/static/")
              ]

          print(f"wheel: {wheel_path}")
          print(f"static file count: {len(static_files)}")

          if not static_files:
              print("Wheel does not contain comfyui_frontend_package/static assets", file=sys.stderr)
              sys.exit(1)
          PY

      - name: Upload artifact (for debugging)
        uses: actions/upload-artifact@v4
        with:
          name: python-wheel-uat-dev
          path: comfyui_frontend_package/dist/*.whl
          retention-days: 3

      - name: Publish UAT package to PyPI
        env:
          TWINE_USERNAME: "__token__"
          TWINE_PASSWORD: ${{ secrets.PYPI_KEY }}
        run: |
          python -m twine upload comfyui_frontend_package/dist/*.whl
