name: Publish Dev Package to UAT

on:
  workflow_dispatch:
    inputs:
      branch:
        description: "Publish Dev Package to UAT"
        required: false
        default: "dev"
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ github.event.inputs.branch || 'dev' }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout specified branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch || 'dev' }}

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Read original version and create UAT version
        id: version_processing
        run: |
          ORIGINAL_VERSION=$(cat version.txt)
          echo "Original version: $ORIGINAL_VERSION"

          TIMESTAMP=$(date +%Y%m%d%H%M%S)
          UAT_VERSION="${ORIGINAL_VERSION}.dev${TIMESTAMP}"

          echo "UAT_VERSION=$UAT_VERSION" >> $GITHUB_ENV
          echo "Publishing UAT version: $UAT_VERSION"

          echo "$UAT_VERSION" > version.txt

      - name: Install Python build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build wheel twine

      - name: Build Python package
        run: |
          rm -rf dist
          python -m build --wheel

      - name: Verify package version
        run: |
          PACKAGE_NAME=$(ls dist/*.whl | head -n1)
          echo "Built package: $PACKAGE_NAME"

          if [[ $PACKAGE_NAME != *"$UAT_VERSION"* ]]; then
            echo "Error: Package version doesn't match expected UAT version"
            echo "Expected: $UAT_VERSION"
            echo "Actual package: $PACKAGE_NAME"
            exit 1
          fi

      - name: Upload artifact (for debugging)
        uses: actions/upload-artifact@v4
        with:
          name: python-wheel-uat-dev
          path: dist/*.whl
          retention-days: 3

      - name: Publish UAT package to PyPI
        env:
          TWINE_USERNAME: "__token__"
          TWINE_PASSWORD: ${{ secrets.PYPI_KEY }}
        run: |
          python -m twine upload dist/*.whl
