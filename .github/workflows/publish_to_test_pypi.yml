name: Publish to TestPyPI (Manual)

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to publish (default: dev)'
        required: false
        default: 'dev'
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ github.event.inputs.branch || 'dev' }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout specified branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch || 'dev' }}

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build wheel twine

      - name: Build package
        run: |
          rm -rf dist
          python -m build --wheel

      - name: Upload artifact (for debugging)
        uses: actions/upload-artifact@v4
        with:
          name: python-wheel
          path: dist/*.whl
          retention-days: 1

      - name: Publish to TestPyPI
        env:
          TWINE_USERNAME: "__token__"
          TWINE_PASSWORD: ${{ secrets.TEST_PYPI_TOKEN }}
        run: |
          python -m twine upload --repository-url https://test.pypi.org/legacy/ dist/*.whl
